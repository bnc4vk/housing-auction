<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Auction Property Explorer</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app">
      <aside class="panel">
        <div class="panel-head">
          <h1>Auction Explorer</h1>
          <button id="toggleFiltersBtn" class="filters-toggle" type="button">Filters</button>
        </div>

        <div class="controls" id="controls">
          <label class="full">
            Search
            <input id="searchInput" type="text" placeholder="e.g. 4906313100 or La Mesa" />
          </label>
          <label>
            County
            <select id="countySelect">
              <option value="all">All</option>
              <option value="San Diego">San Diego</option>
              <option value="Riverside">Riverside</option>
            </select>
          </label>
          <label>
            Top
            <input id="limitInput" type="number" min="10" max="1500" step="10" value="10" />
          </label>
          <label class="inline">
            <input id="buildableOnly" type="checkbox" />
            <span class="hover-hint hover-hint-left hover-hint-wide hover-hint-text" tabindex="0">
              Buildability pass only
              <span class="hover-bubble"
                >Pass means the parcel passed automated screen checks for size, hazard overlays, and basic
                buildability signals.</span
              >
            </span>
          </label>
          <label class="inline">
            <input id="showUnmapped" type="checkbox" />
            Show unmapped
          </label>
          <button id="resetBtn" class="full" type="button">Reset</button>
        </div>

        <div class="stats" id="stats"></div>
        <div class="list" id="propertyList"></div>
      </aside>
      <main class="map-wrap">
        <div id="map"></div>
      </main>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
